# All Resource Types Example
# A reference deployment exercising every one of the 45 supported Fabric
# item types. Use it as a copy-paste catalogue — most real projects need
# only a handful of these. Resource keys for strict-naming types
# (lakehouses, warehouses, eventhouses, kql_databases, sql_databases) use
# underscores only; hyphens and spaces are not allowed there.

deployment:
  name: all-resource-types
  version: "1.0.0"
  description: "Reference deployment that uses all 45 supported resource types"

workspace:
  capacity_id: "${var.capacity_id}"
  # Group every deployed item into a Fabric workspace folder by type. With all
  # 45 types present, this creates folders: Agents, Data Engineering,
  # Data Factory, Databases, Environments, Graph, Healthcare, Lakehouses, Maps,
  # Models, Notebooks, Pipelines, Real-Time, Reports, Variables, Warehouses.
  folders_by_type: true

variables:
  capacity_id:
    description: "Fabric capacity GUID"
    default: "REPLACE-WITH-YOUR-CAPACITY-GUID"

resources:

  # --- Data Engineering -----------------------------------------------------
  environments:
    spark_env:
      description: "Shared Spark runtime + libraries"
      runtime: "1.3"
      libraries: [semantic-link-labs]
      conda_dependencies: []
      spark_properties:
        spark.sql.shuffle.partitions: "200"

  lakehouses:
    raw_lakehouse:
      description: "Raw landing zone"
      schemas: [landing]
      shortcuts:
        - name: external_sales
          target: "abfss://data@contoso.dfs.core.windows.net/sales"
          path: Tables
    curated_lakehouse:
      description: "Curated, business-ready datasets"
      tables:
        sales:
          partition_by: [order_date]
          description: "Curated sales fact table"

  notebooks:
    ingest_notebook:
      path: ./notebooks/ingest.py
      description: "Ingest raw data into the lakehouse"
      environment: spark_env
      default_lakehouse: raw_lakehouse

  spark_job_definitions:
    batch_job:
      description: "Scheduled Spark batch job"
      path: ./spark/batch_job.py
      environment: spark_env
      default_lakehouse: curated_lakehouse
      args: ["--mode", "full"]

  graphql_apis:
    data_api:
      description: "GraphQL API over curated data"
      data_source: curated_lakehouse

  user_data_functions:
    udf_helpers:
      description: "Reusable user data functions"
      path: ./functions/
      runtime: python

  # --- Data Factory ---------------------------------------------------------
  pipelines:
    orchestration_pipeline:
      description: "Orchestrates ingestion and transformation"
      schedule:
        cron: "0 6 * * *"
        timezone: America/Chicago
      activities:
        - notebook: ingest_notebook

  copy_jobs:
    copy_job:
      description: "Copy data between stores"
      path: ./copyjobs/copy.json

  airflow_jobs:
    airflow_dag:
      description: "Apache Airflow orchestration job"
      path: ./airflow/

  mounted_data_factories:
    mounted_adf:
      description: "Mounted Azure Data Factory"
      data_factory_id: "/subscriptions/.../resourceGroups/rg/providers/Microsoft.DataFactory/factories/adf"

  dbt_jobs:
    dbt_transform:
      description: "dbt transformation job (capacity-gated)"
      path: ./dbt/
      environment: spark_env

  # --- Data Warehouse -------------------------------------------------------
  warehouses:
    analytics_warehouse:
      description: "SQL analytics warehouse"
      sql_scripts:
        - ./sql/create_views.sql

  sql_databases:
    app_db:
      description: "Operational SQL database"
      sql_scripts:
        - ./sql/app_schema.sql

  mirrored_databases:
    mirrored_sales:
      description: "Mirrored source database"
      source_type: SQLServer
      connection: "${var.capacity_id}"

  mirrored_warehouses:
    mirrored_dw:
      description: "Mirrored warehouse (list-only)"
      source_type: Snowflake

  snowflake_databases:
    snowflake_db:
      description: "Snowflake-backed database (needs connection)"
      connection: "snowflake-conn"

  cosmosdb_databases:
    cosmos_db:
      description: "Cosmos DB mirrored database"
      connection: "cosmos-conn"

  mirrored_databricks_catalogs:
    databricks_catalog:
      description: "Mirrored Azure Databricks catalog"
      connection: "databricks-conn"

  datamarts:
    sales_datamart:
      description: "Sales datamart (list-only)"

  # --- Power BI -------------------------------------------------------------
  semantic_models:
    sales_model:
      path: ./semantic_model/
      description: "Sales semantic model (needs TMDL)"
      default_lakehouse: curated_lakehouse

  reports:
    sales_report:
      path: ./reports/sales/
      description: "Sales report (needs PBIR)"
      semantic_model: sales_model

  paginated_reports:
    invoice_report:
      description: "Paginated invoice report (list-only)"
      path: ./reports/invoices/
      data_source: sales_model

  dashboards:
    exec_dashboard:
      description: "Executive dashboard (list-only)"

  dataflows:
    ingest_dataflow:
      description: "Gen2 dataflow (list-only)"
      path: ./dataflows/ingest/

  # --- Data Science ---------------------------------------------------------
  ml_models:
    churn_model:
      description: "Customer churn model"
      framework: sklearn

  ml_experiments:
    churn_experiment:
      description: "Churn model training experiment"

  # --- Real-Time Intelligence ----------------------------------------------
  eventhouses:
    telemetry_eventhouse:
      description: "Eventhouse for IoT telemetry"
      kql_scripts:
        - ./kql/create_tables.kql
      retention_days: 90

  kql_databases:
    telemetry_db:
      description: "KQL database for device telemetry"
      parent_eventhouse: telemetry_eventhouse

  eventstreams:
    telemetry_stream:
      description: "Ingests IoT device events in real time"

  kql_querysets:
    telemetry_queries:
      description: "Saved KQL queries"
      path: ./kql/queries/
      data_source: telemetry_db

  kql_dashboards:
    ops_dashboard:
      description: "Real-time operations dashboard"
      data_source: telemetry_db

  reflex:
    anomaly_alerts:
      description: "Data Activator alerting rules"
      path: ./reflex/rules.json

  digital_twin_builders:
    twin_builder:
      description: "Digital twin builder"
      path: ./twins/

  digital_twin_builder_flows:
    twin_flow:
      description: "Digital twin builder flow (needs config)"
      path: ./twins/flows/
      twin_builder: twin_builder

  event_schema_sets:
    event_schemas:
      description: "Event schema set (capacity-gated)"
      path: ./schemas/

  graph_query_sets:
    graph_queries:
      description: "Saved graph queries"
      path: ./graphs/queries/
      data_source: knowledge_graph

  # --- AI & Knowledge -------------------------------------------------------
  data_agents:
    analytics_agent:
      description: "Natural-language analytics agent"
      sources: [curated_lakehouse]
      instructions: ./agent/instructions.md
      few_shot_examples: ./agent/examples.yaml

  operations_agents:
    ops_agent:
      description: "Operations copilot agent"
      sources: [telemetry_db]
      instructions: ./agent/ops_instructions.md

  anomaly_detectors:
    anomaly_detector:
      description: "Anomaly detection over telemetry"
      data_source: telemetry_db
      path: ./anomaly/

  ontologies:
    domain_ontology:
      description: "Business domain ontology"
      path: ./ontology/
      data_sources: [curated_lakehouse]

  # --- Graph & Spatial ------------------------------------------------------
  graphs:
    knowledge_graph:
      description: "Knowledge graph"
      path: ./graphs/
      data_source: curated_lakehouse

  graph_models:
    graph_model:
      description: "Graph model definition"
      path: ./graphs/model/
      data_source: curated_lakehouse

  map_items:
    asset_map:
      description: "Geospatial asset map"
      path: ./maps/

  hls_cohorts:
    patient_cohort:
      description: "Healthcare cohort (capacity-gated)"
      path: ./cohorts/

  # --- Shared configuration -------------------------------------------------
  variable_libraries:
    shared_vars:
      description: "Workspace-shared variables"
      variables:
        region: westus2
        tier: standard

security:
  roles:
    - name: engineers
      entra_group: sg-data-eng
      workspace_role: contributor
    - name: analysts
      entra_group: sg-analysts
      workspace_role: viewer

targets:
  dev:
    default: true
    workspace:
      name: all-resource-types-dev
      capacity_id: "${var.capacity_id}"
  prod:
    workspace:
      name: all-resource-types-prod
      capacity_id: "${var.capacity_id}"
